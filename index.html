
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Jos Café — Corte de Caja</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#fdf6ec;-webkit-tap-highlight-color:transparent;}
input,select,textarea,button{font-family:Arial,sans-serif;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
.joscafe{font-family:'Great Vibes',cursive;}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createElement:h,useState,useEffect,useCallback,Fragment}=React;

const COMMISSION=0.04;
const APP_VERSION="1.3";
const APP_DATE="mayo 2026";
const STORAGE_KEY_M="joscafe_morning_v1";
const STORAGE_KEY_N="joscafe_night_v1";
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwb1JQEfy7oFfWdj2lhu7CY06j5pUNG7SnpBL1vv0IcHFDdt5XLV2VpU7nq7p9zHnb3Aw/exec";
const DEFAULT_CATEGORIES=["Sueldo","Hielo","Insumos","Servicios","Mantenimiento","Otro"];
const DEFAULT_BARISTAS=["Fernanda","Tania","Otro"];

const flr=n=>Math.floor(n);
const num=v=>{const n=parseFloat(String(v).replace(/,/g,""));return isNaN(n)?0:n;};
const fmt=n=>new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",minimumFractionDigits:0,maximumFractionDigits:0}).format(flr(n)||0);
const defaultMorning=()=>({barista:DEFAULT_BARISTAS[0],hora:"",ventaEfectivo:"",ventaTarjeta:"",transferencias:"",propinaTarjeta:"",otrosIngresos:[],gastos:[],efectivoReal:"",notas:""});
const defaultNight=()=>({barista:DEFAULT_BARISTAS[0],fecha:new Date().toISOString().split("T")[0],ventaEfectivo:"",ventaTarjeta:"",transferencias:"",propinaTarjeta:"",gastos:[],otrosIngresos:[],efectivoReal:"",notas:""});

// ── Style helpers ─────────────────────────────────────────────────────────────
const s={
  card:{background:"#fff",borderRadius:14,padding:"18px 16px",boxShadow:"0 2px 12px rgba(44,31,14,0.07)",border:"1px solid #f0e8de",marginBottom:14},
  label:{display:"block",fontSize:10,fontWeight:700,letterSpacing:"0.08em",color:"#8a7560",marginBottom:4,textTransform:"uppercase"},
  input:{width:"100%",boxSizing:"border-box",padding:"10px 12px 10px 24px",background:"#faf7f3",border:"1.5px solid #e8dfd4",borderRadius:8,fontSize:15,fontFamily:"monospace",color:"#2c1f0e",outline:"none"},
  select:{width:"100%",padding:"8px 10px",background:"#faf7f3",border:"1.5px solid #e8dfd4",borderRadius:8,fontSize:13,color:"#2c1f0e"},
  textarea:{width:"100%",padding:"10px 12px",background:"#faf7f3",border:"1.5px solid #e8dfd4",borderRadius:8,fontSize:13,color:"#2c1f0e",resize:"vertical",boxSizing:"border-box",fontFamily:"Arial,sans-serif"},
};

// ── Atoms ─────────────────────────────────────────────────────────────────────
function Label({children}){return h("label",{style:s.label},children);}
function Card({children,style}){return h("div",{style:{...s.card,...style}},children);}

function SectionHeader({icon,title,accent}){
  return h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16}},
    h("div",{style:{width:30,height:30,borderRadius:8,background:accent||"#c9a96e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}},icon),
    h("h2",{style:{margin:0,fontSize:13,fontWeight:800,letterSpacing:"0.06em",color:"#2c1f0e",textTransform:"uppercase"}},title)
  );
}

function MoneyInput({label,value,onChange,hint,readOnly}){
  return h("div",{style:{marginBottom:14}},
    label&&h(Label,null,label),
    hint&&h("p",{style:{fontSize:11,color:"#7a9a7a",marginBottom:6,marginTop:0,fontWeight:600}},hint),
    h("div",{style:{position:"relative"}},
      h("span",{style:{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#8a7560",fontWeight:700,fontSize:14,fontFamily:"monospace"}},"$"),
      h("input",{type:"number",min:0,step:1,value,readOnly,
        onChange:e=>onChange&&onChange(e.target.value),
        style:{...s.input,background:readOnly?"#f5f0ea":"#faf7f3"},
        onFocus:e=>{if(!readOnly)e.target.style.borderColor="#c9a96e";},
        onBlur:e=>{e.target.style.borderColor="#e8dfd4";}
      })
    )
  );
}

function DiferenciaBox({teorico,real}){
  if(real==="")return null;
  const dif=num(real)-num(teorico);
  const ok=dif>=0;
  return h("div",{style:{borderRadius:10,padding:"12px 16px",marginTop:8,background:ok?"#f0fff4":"#fff4f0",border:`1.5px solid ${ok?"#9adcb0":"#f0b8a8"}`}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("span",{style:{fontSize:13,fontWeight:700,color:ok?"#2d7a4a":"#c04030"}},dif===0?"✅ Cuadre perfecto":ok?"✅ Sobrante":"⚠️ Faltante"),
      h("span",{style:{fontFamily:"monospace",fontWeight:800,fontSize:17,color:ok?"#2d7a4a":"#c04030"}},(dif>=0?"+":"")+fmt(dif))
    )
  );
}

function ClearButton({onClear}){
  const [confirm,setConfirm]=useState(false);
  if(confirm)return h("div",{style:{display:"flex",alignItems:"center",gap:8}},
    h("span",{style:{fontSize:12,color:"#c04030",fontWeight:600}},"¿Borrar datos?"),
    h("button",{onClick:()=>{onClear();setConfirm(false);},style:{background:"#c04030",border:"none",borderRadius:6,color:"#fff",fontSize:11,fontWeight:700,padding:"4px 10px",cursor:"pointer"}},"Sí, borrar"),
    h("button",{onClick:()=>setConfirm(false),style:{background:"#f0e8de",border:"none",borderRadius:6,color:"#6b5a47",fontSize:11,fontWeight:700,padding:"4px 10px",cursor:"pointer"}},"Cancelar")
  );
  return h("button",{onClick:()=>setConfirm(true),title:"Borrar datos",style:{background:"none",border:"1px solid #e0d0c0",borderRadius:8,padding:"5px 8px",cursor:"pointer",color:"#a09080",fontSize:15,display:"flex",alignItems:"center"}},"🗑");
}

function HelpIcon(){
  const [open,setOpen]=useState(false);
  return h("div",{style:{position:"relative",display:"inline-block"}},
    h("button",{onClick:()=>setOpen(!open),style:{background:"#f0e8de",border:"none",borderRadius:"50%",width:20,height:20,fontSize:11,fontWeight:900,color:"#8a7560",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}},"?"),
    open&&h("div",{onClick:()=>setOpen(false),style:{position:"absolute",top:26,right:0,background:"#fff",border:"1.5px solid #e8dfd4",borderRadius:10,padding:"12px 14px",width:240,boxShadow:"0 4px 16px rgba(44,31,14,0.12)",zIndex:50,fontSize:12,color:"#4a3a28",lineHeight:1.6}},
      h("div",{style:{fontWeight:800,marginBottom:6,color:"#2c1f0e"}},"Si un número no cuadra"),
      h("ol",{style:{margin:0,paddingLeft:16}},
        h("li",null,"Corrobora todos los cobros en la terminal uno por uno."),
        h("li",null,"Verifica en Waiterio que el método de pago sea correcto."),
        h("li",null,"Anota la diferencia en la sección de Notas."),
        h("li",null,"Comunícate con gerencia para resolver.")
      ),
      h("div",{style:{marginTop:8,fontSize:11,color:"#8a7560"}},"Toca para cerrar")
    )
  );
}

function OtrosIngresos({items,onAdd,onRemove,onUpdate}){
  const [open,setOpen]=useState(false);
  const total=items.reduce((s,o)=>s+num(o.cantidad),0);
  return h("div",{style:{marginBottom:14}},
    h("button",{onClick:()=>setOpen(!open),style:{width:"100%",padding:"11px 16px",background:open?"#fff":"transparent",border:`1.5px ${open?"solid #e8dfd4":"dashed #cfc4b6"}`,borderRadius:open?"10px 10px 0 0":10,cursor:"pointer",display:"flex",alignItems:"center",gap:10,color:"#7a6a55",fontSize:13,fontWeight:600}},
      h("span",null,open?"▾":"▸"),h("span",null,"Otros ingresos en efectivo"),
      total>0&&h("span",{style:{marginLeft:"auto",fontFamily:"monospace",color:"#4a8c5c",fontWeight:700}},"+"+fmt(total))
    ),
    open&&h("div",{style:{background:"#fff",border:"1.5px solid #e8dfd4",borderTop:"none",borderRadius:"0 0 10px 10px",padding:"12px 12px 10px"}},
      h("div",{style:{display:"flex",justifyContent:"flex-end",marginBottom:8}},
        h("button",{onClick:onAdd,style:{background:"#f0fff4",border:"1.5px solid #9adcb0",color:"#2d7a4a",borderRadius:7,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}},"+ Agregar ingreso")
      ),
      items.length===0&&h("p",{style:{fontSize:12,color:"#b0a090",textAlign:"center",margin:0}},"Sin ingresos adicionales"),
      items.map((o,i)=>h("div",{key:i,style:{display:"flex",gap:8,marginBottom:8}},
        h("div",{style:{position:"relative",width:100}},
          h("span",{style:{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:"#8a7560",fontSize:12,fontFamily:"monospace"}},"$"),
          h("input",{type:"number",min:0,step:1,placeholder:"0",value:o.cantidad,onChange:e=>onUpdate(i,"cantidad",e.target.value),style:{width:"100%",padding:"7px 4px 7px 18px",background:"#faf7f3",border:"1.5px solid #e8dfd4",borderRadius:7,fontSize:13,fontFamily:"monospace",boxSizing:"border-box"}})
        ),
        h("input",{placeholder:"Descripción...",value:o.nota,onChange:e=>onUpdate(i,"nota",e.target.value),style:{flex:1,padding:"7px 10px",background:"#faf7f3",border:"1.5px solid #e8dfd4",borderRadius:7,fontSize:12,color:"#2c1f0e"}}),
        h("button",{onClick:()=>onRemove(i),style:{background:"#fff0f0",border:"1px solid #f8d0d0",borderRadius:7,color:"#d04444",cursor:"pointer",padding:"0 10px",fontSize:15}},"×")
      ))
    )
  );
}

function ExpenseBlock({gastos,onAdd,onRemove,onUpdate,fromMorningCount=0}){
  return h("div",null,
    gastos.length===0&&h("p",{style:{fontSize:13,color:"#b0a090",textAlign:"center",margin:"0 0 8px"}},"Sin gastos registrados"),
    gastos.map((g,i)=>{
      const locked=!!g.fromMorning;
      const nightIdx=i-fromMorningCount;
      return h("div",{key:i,style:{background:locked?"#fffbf0":"#fdf8f4",borderRadius:10,padding:"10px 12px",marginBottom:8,border:`1px solid ${locked?"#f0e0a8":"#f0e8de"}`,opacity:g.deCartera?0.72:1}},
        locked&&h("div",{style:{fontSize:10,color:"#9a7a30",fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}},"🌤 Del turno mañana"),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:locked?4:8}},
          h("div",null,
            !locked&&h(Label,null,"Monto"),
            h("div",{style:{position:"relative"}},
              h("span",{style:{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:"#8a7560",fontSize:12,fontFamily:"monospace"}},"$"),
              h("input",{type:"number",min:0,step:1,value:g.cantidad,readOnly:locked,onChange:e=>!locked&&onUpdate(nightIdx,"cantidad",e.target.value),style:{width:"100%",padding:"7px 4px 7px 18px",background:locked?"#f5f0e4":"#fff",border:"1.5px solid #e8dfd4",borderRadius:7,fontSize:14,fontFamily:"monospace",boxSizing:"border-box"}})
            )
          ),
          h("div",null,
            !locked&&h(Label,null,"Categoría"),
            h("select",{value:g.categoria,disabled:locked,onChange:e=>!locked&&onUpdate(nightIdx,"categoria",e.target.value),style:{width:"100%",padding:"8px",background:locked?"#f5f0e4":"#fff",border:"1.5px solid #e8dfd4",borderRadius:7,fontSize:12,color:"#2c1f0e"}},
              DEFAULT_CATEGORIES.map(c=>h("option",{key:c},c))
            )
          )
        ),
        !locked&&h("div",{style:{display:"flex",gap:8,marginBottom:8}},
          h("input",{placeholder:"Nota",value:g.nota,onChange:e=>onUpdate(nightIdx,"nota",e.target.value),style:{flex:1,padding:"7px 10px",background:"#fff",border:"1.5px solid #e8dfd4",borderRadius:7,fontSize:12,color:"#2c1f0e"}}),
          h("button",{onClick:()=>onRemove(nightIdx),style:{background:"#fff0f0",border:"1px solid #f8d0d0",borderRadius:7,color:"#d04444",cursor:"pointer",padding:"0 12px",fontSize:16}},"×")
        ),
        locked&&g.nota&&h("div",{style:{fontSize:12,color:"#8a7040",marginTop:2}},g.categoria+(g.nota?" · "+g.nota:"")),
        h("div",{style:{display:"flex",alignItems:"center",gap:6,marginTop:locked?6:0}},
          h("input",{type:"checkbox",id:`cartera-${i}`,checked:!!g.deCartera,disabled:locked,onChange:e=>!locked&&onUpdate(nightIdx,"deCartera",e.target.checked),style:{width:13,height:13,accentColor:"#8a7560",cursor:locked?"default":"pointer"}}),
          h("label",{htmlFor:`cartera-${i}`,style:{fontSize:11,color:"#8a7560",cursor:locked?"default":"pointer",userSelect:"none"}},"Pagado de cartera"+(g.deCartera?" · no afecta caja":""))
        )
      );
    }),
    h("button",{onClick:onAdd,style:{width:"100%",padding:"9px",background:"#fff5ee",border:"1.5px dashed #e8c4a0",color:"#c97a4a",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",marginTop:2}},"+ Agregar gasto")
  );
}

function ResumenRows({rows}){
  return h(Fragment,null,
    rows.filter(Boolean).map((r,i)=>h("div",{key:i,style:{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #f5efe8"}},
      h("span",{style:{fontSize:13,color:r.color||"#6b5a47"}},r.label),
      h("span",{style:{fontFamily:"monospace",fontWeight:600,color:r.color||"#2c1f0e"}},r.value)
    ))
  );
}

function InfoModal({onClose}){
  const [showHow,setShowHow]=useState(false);
  return h("div",{style:{position:"fixed",inset:0,background:"rgba(44,31,14,0.55)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"},onClick:onClose},
    h("div",{onClick:e=>e.stopPropagation(),style:{background:"#fffbf4",borderRadius:"20px 20px 0 0",padding:"24px 22px 44px",width:"100%",maxWidth:480,maxHeight:"88vh",overflowY:"auto"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
        h("div",{style:{display:"flex",alignItems:"center",gap:10}},
          h("span",{style:{fontSize:22}},"☕"),
          h("div",null,
            h("div",{style:{fontWeight:900,fontSize:15,color:"#2c1f0e"}},"Jos Café · Corte de Caja"),
            h("div",{style:{fontSize:11,color:"#8a7560"}},"v"+APP_VERSION+" · "+APP_DATE)
          )
        ),
        h("button",{onClick:onClose,style:{background:"#f0e8de",border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontWeight:700,color:"#6b5a47",fontSize:13}},"Cerrar")
      ),
      [
        {body:"Esta aplicación guía el registro del corte diario de caja, incluyendo ventas, propinas, gastos y conteo de efectivo."},
        {title:"Guardado automático",body:"Los datos se guardan en este iPad mientras la sesión esté activa. Si Safari se cierra accidentalmente, al volver a abrir la app los datos estarán disponibles. Si el iPad se reinicia o se borra el historial de Safari, los datos no guardados se perderán."},
        {title:"Borrar datos",body:"Cada pantalla de corte tiene un ícono 🗑 para borrar los datos de ese turno. Usarlo al iniciar un nuevo día."},
        {title:"Corte de mañana",body:"Se realiza al finalizar el turno de mañana. Se envía como respaldo a la base de datos al presionar Listo."},
        {title:"Corte de cierre",body:"Se realiza al finalizar el turno de tarde. Es el registro oficial del día completo."},
      ].map((s,i)=>h("div",{key:i,style:{marginBottom:16}},
        s.title&&h("div",{style:{fontSize:12,fontWeight:800,color:"#6b4a20",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.06em"}},s.title),
        h("p",{style:{margin:0,fontSize:13,color:"#4a3a28",lineHeight:1.6}},s.body)
      )),
      h("button",{onClick:()=>setShowHow(!showHow),style:{width:"100%",padding:"10px 14px",background:"#f5efe6",border:"1px solid #e0d0b8",borderRadius:10,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,fontWeight:700,color:"#6b4a20",marginBottom:showHow?0:16}},
        h("span",null,"¿Cómo usar esta aplicación?"),h("span",null,showHow?"▴":"▾")
      ),
      showHow&&h("div",{style:{background:"#fdf8f0",border:"1px solid #e0d0b8",borderTop:"none",borderRadius:"0 0 10px 10px",padding:"14px 16px",marginBottom:16}},
        [
          {n:1,title:"Turno mañana",body:"Al iniciar, verifica que haya $1,500 en caja. Registra ventas de Waiterio, propinas de la terminal y gastos. Al finalizar el turno, ingresa el efectivo real y presiona Listo."},
          {n:2,title:"Entrega de turno",body:"El barista de tarde revisa el resumen del turno mañana desde el botón en el encabezado del corte de cierre."},
          {n:3,title:"Corte de cierre",body:"Al finalizar el turno de tarde. Ingresa totales del día de Waiterio, propinas de la terminal, gastos, y efectivo real sin incluir el fondo de $1,500."},
          {n:4,title:"Si algo no cuadra",body:"Usa el ícono ? junto a ventas. Anota la situación en Notas y avisa a gerencia."},
          {n:5,title:"Nuevo día",body:"Usa el ícono 🗑 para borrar los datos del día anterior antes de empezar."},
        ].map(s=>h("div",{key:s.n,style:{marginBottom:14}},
          h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},
            h("div",{style:{width:20,height:20,borderRadius:"50%",background:"#c9a96e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:"#fff",flexShrink:0}},s.n),
            h("span",{style:{fontSize:12,fontWeight:800,color:"#4a3010",textTransform:"uppercase",letterSpacing:"0.05em"}},s.title)
          ),
          h("p",{style:{margin:"0 0 0 28px",fontSize:12,color:"#5a4530",lineHeight:1.6}},s.body)
        ))
      ),
      h("div",{style:{borderTop:"1px solid #e8dfd4",paddingTop:16}},
        h("p",{style:{margin:0,fontSize:11,color:"#a09080",lineHeight:1.7}},"Desarrollado por Carlos Martell con Claude.",h("br"),"Versión "+APP_VERSION+" · Actualización: "+APP_DATE)
      )
    )
  );
}

function MorningSummaryModal({morning,onClose}){
  const propinaNeta=flr(num(morning.propinaTarjeta)*(1-COMMISSION));
  const totalGastosCaja=morning.gastos.filter(g=>!g.deCartera).reduce((s,g)=>s+num(g.cantidad),0);
  const totalOtros=morning.otrosIngresos.reduce((s,o)=>s+num(o.cantidad),0);
  const teorico=num(morning.ventaEfectivo)+totalOtros-totalGastosCaja-propinaNeta;
  const has=morning.ventaEfectivo||morning.gastos.length>0||morning.propinaTarjeta||morning.ventaTarjeta;
  return h("div",{style:{position:"fixed",inset:0,background:"rgba(44,31,14,0.55)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"},onClick:onClose},
    h("div",{onClick:e=>e.stopPropagation(),style:{background:"#fffbf4",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:480,maxHeight:"80vh",overflowY:"auto"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
        h("div",{style:{display:"flex",alignItems:"center",gap:10}},
          h("span",{style:{fontSize:20}},"🌤"),
          h("div",null,
            h("div",{style:{fontWeight:800,fontSize:14,color:"#2c1f0e"}},"Resumen Turno Mañana"),
            morning.barista&&h("div",{style:{fontSize:11,color:"#8a7560"}},morning.barista+(morning.hora?" · hasta "+morning.hora:""))
          )
        ),
        h("button",{onClick:onClose,style:{background:"#f0e8de",border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontWeight:700,color:"#6b5a47",fontSize:13}},"Cerrar")
      ),
      !has?h("div",{style:{textAlign:"center",padding:"24px 0",color:"#b0a090",fontSize:13}},"El turno mañana no registró datos aún."):
      h(Fragment,null,
        h("div",{style:{background:"#fff",borderRadius:12,padding:"12px 14px",marginBottom:10,border:"1px solid #f0e8de"}},
          h("div",{style:{fontSize:11,fontWeight:700,color:"#8a7560",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}},"Ventas del turno"),
          morning.ventaEfectivo&&h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}},h("span",{style:{color:"#6b5a47"}},"Efectivo"),h("span",{style:{fontFamily:"monospace",fontWeight:700}},fmt(num(morning.ventaEfectivo)))),
          morning.ventaTarjeta&&h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}},h("span",{style:{color:"#6b5a47"}},"Tarjeta"),h("span",{style:{fontFamily:"monospace",fontWeight:700}},fmt(num(morning.ventaTarjeta)))),
          num(morning.propinaTarjeta)>0&&h(Fragment,null,
            h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}},h("span",{style:{color:"#6b5a47"}},"Propina tarjeta"),h("span",{style:{fontFamily:"monospace"}},fmt(num(morning.propinaTarjeta)))),
            h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,color:"#5060a0"}},h("span",null,"Propina turno mañana (96%)"),h("span",{style:{fontFamily:"monospace",fontWeight:700}},fmt(propinaNeta)))
          )
        ),
        morning.gastos.length>0&&h("div",{style:{background:"#fff",borderRadius:12,padding:"12px 14px",marginBottom:10,border:"1px solid #f0e8de"}},
          h("div",{style:{fontSize:11,fontWeight:700,color:"#8a7560",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}},"Gastos del turno"),
          morning.gastos.map((g,i)=>h("div",{key:i,style:{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}},
            h("span",{style:{color:"#6b5a47"}},g.categoria+(g.nota?" · "+g.nota:"")+(g.deCartera?" 👜":"")),
            h("span",{style:{fontFamily:"monospace",color:g.deCartera?"#a09080":"#c97a4a"}},"− "+fmt(num(g.cantidad)))
          ))
        ),
        morning.notas&&h("div",{style:{background:"#fff8ee",borderRadius:12,padding:"10px 14px",marginBottom:10,border:"1px solid #f0dfa8",fontSize:13,color:"#6b5a47"}},h("span",{style:{fontWeight:700}},"Nota: "),morning.notas),
        h("div",{style:{background:"#f0f7f2",borderRadius:12,padding:"12px 14px",border:"1px solid #9adcb0"}},
          h("div",{style:{display:"flex",justifyContent:"space-between"}},
            h("span",{style:{fontWeight:800,fontSize:14,color:"#2c5a3a"}},"Efectivo teórico turno"),
            h("span",{style:{fontFamily:"monospace",fontWeight:900,fontSize:17,color:"#2c5a3a"}},fmt(teorico))
          )
        )
      )
    )
  );
}

function ConfirmationScreen({title,iconEmoji,rows,teorico,efectivoReal,notas,onBack}){
  return h("div",{style:{minHeight:"100vh",background:"linear-gradient(160deg,#fdf6ec 0%,#f5ece0 100%)",paddingBottom:40}},
    h("div",{style:{background:"#4a7a3a",padding:"14px 20px",display:"flex",alignItems:"center",gap:12}},
      h("span",{style:{fontSize:20}},"✅"),
      h("div",null,
        h("div",{style:{fontWeight:800,fontSize:14,color:"#fff"}},"Corte enviado"),
        h("div",{style:{fontSize:11,color:"rgba(255,255,255,0.75)"}},"Revisa el resumen antes de salir")
      )
    ),
    h("div",{style:{padding:"20px 16px",maxWidth:480,margin:"0 auto"}},
      h(Card,null,
        h(SectionHeader,{icon:iconEmoji,title,accent:"#8a6a30"}),
        h(ResumenRows,{rows}),
        h("div",{style:{height:1,background:"#e0c898",margin:"10px 0"}}),
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
          h("span",{style:{fontWeight:800,fontSize:14,color:"#2c1f0e"}},"Efectivo teórico"),
          h("span",{style:{fontFamily:"monospace",fontWeight:900,fontSize:16,color:num(teorico)<0?"#c04030":"#2c1f0e"}},fmt(num(teorico)))
        ),
        efectivoReal!==""&&h(Fragment,null,
          h("div",{style:{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #f5efe8"}},
            h("span",{style:{fontSize:13,color:"#6b5a47"}},"Efectivo real contado"),
            h("span",{style:{fontFamily:"monospace",fontWeight:700}},fmt(num(efectivoReal)))
          ),
          h(DiferenciaBox,{teorico,real:efectivoReal})
        ),
        notas&&h("div",{style:{background:"#fff8ee",borderRadius:8,padding:"8px 12px",marginTop:10,border:"1px solid #f0dfa8",fontSize:12,color:"#6b5a47"}},h("span",{style:{fontWeight:700}},"Notas: "),notas)
      ),
      h("button",{onClick:onBack,style:{width:"100%",padding:"14px",background:"#2c1f0e",color:"#fff",border:"none",borderRadius:12,fontWeight:800,fontSize:14,cursor:"pointer"}},"Regresar al inicio")
    )
  );
}

// ══════════════════════════════════════════════════════════════════════════════
function App(){
  const [step,setStep]=useState("menu");
  const [showInfo,setShowInfo]=useState(false);
  const [showMorningSummary,setShowMorningSummary]=useState(false);
  const [morningConfirmed,setMorningConfirmed]=useState(false);
  const [nightConfirmed,setNightConfirmed]=useState(false);
  const [submittingNight,setSubmittingNight]=useState(false);
  const [morning,setMorningState]=useState(defaultMorning);
  const [night,setNightState]=useState(defaultNight);

  useEffect(()=>{
    try{
      const m=localStorage.getItem(STORAGE_KEY_M);
      const n=localStorage.getItem(STORAGE_KEY_N);
      if(m)setMorningState(JSON.parse(m));
      if(n)setNightState(JSON.parse(n));
    }catch(e){}
  },[]);

  const setM=useCallback(m=>{setMorningState(m);try{localStorage.setItem(STORAGE_KEY_M,JSON.stringify(m));}catch(e){};},[]);
  const setN=useCallback(n=>{setNightState(n);try{localStorage.setItem(STORAGE_KEY_N,JSON.stringify(n));}catch(e){};},[]);
  const clearMorning=()=>setM(defaultMorning());
  const clearNight=()=>setN(defaultNight());

  // Morning helpers
  const addME=()=>setM({...morning,gastos:[...morning.gastos,{cantidad:"",categoria:DEFAULT_CATEGORIES[0],nota:"",deCartera:false}]});
  const removeME=i=>setM({...morning,gastos:morning.gastos.filter((_,idx)=>idx!==i)});
  const updateME=(i,f,v)=>{const g=[...morning.gastos];g[i]={...g[i],[f]:v};setM({...morning,gastos:g});};
  const addMOI=()=>setM({...morning,otrosIngresos:[...morning.otrosIngresos,{cantidad:"",nota:""}]});
  const removeMOI=i=>setM({...morning,otrosIngresos:morning.otrosIngresos.filter((_,idx)=>idx!==i)});
  const updateMOI=(i,f,v)=>{const o=[...morning.otrosIngresos];o[i]={...o[i],[f]:v};setM({...morning,otrosIngresos:o});};

  // Night helpers
  const morningGastos=morning.gastos.filter(g=>num(g.cantidad)>0).map(g=>({...g,fromMorning:true}));
  const allGastos=[...morningGastos,...night.gastos];
  const addNE=()=>setN({...night,gastos:[...night.gastos,{cantidad:"",categoria:DEFAULT_CATEGORIES[0],nota:"",deCartera:false}]});
  const removeNE=i=>setN({...night,gastos:night.gastos.filter((_,idx)=>idx!==i)});
  const updateNE=(i,f,v)=>{const g=[...night.gastos];g[i]={...g[i],[f]:v};setN({...night,gastos:g});};
  const addOI=()=>setN({...night,otrosIngresos:[...night.otrosIngresos,{cantidad:"",nota:""}]});
  const removeOI=i=>setN({...night,otrosIngresos:night.otrosIngresos.filter((_,idx)=>idx!==i)});
  const updateOI=(i,f,v)=>{const o=[...night.otrosIngresos];o[i]={...o[i],[f]:v};setN({...night,otrosIngresos:o});};

  // Calcs night
  const propinaTotalTerminal=num(night.propinaTarjeta);
  const propinaManana=num(morning.propinaTarjeta);
  const propinaMananaNeta=flr(propinaManana*(1-COMMISSION));
  const propinaNocheBruta=Math.max(0,propinaTotalTerminal-propinaManana);
  const propinaNocheNeta=flr(propinaNocheBruta*(1-COMMISSION));
  const totalPropinaEfectivo=propinaMananaNeta+propinaNocheNeta;
  const totalGastosCajaN=allGastos.filter(g=>!g.deCartera).reduce((s,g)=>s+num(g.cantidad),0);
  const totalGastosCarteraN=allGastos.filter(g=>g.deCartera).reduce((s,g)=>s+num(g.cantidad),0);
  const totalOtrosN=night.otrosIngresos.reduce((s,o)=>s+num(o.cantidad),0);
  const efectivoTeorico=num(night.ventaEfectivo)+totalOtrosN-totalGastosCajaN-totalPropinaEfectivo;

  // Calcs morning
  const propinaMananaNeta2=flr(num(morning.propinaTarjeta)*(1-COMMISSION));
  const totalGastosCajaM=morning.gastos.filter(g=>!g.deCartera).reduce((s,g)=>s+num(g.cantidad),0);
  const totalGastosCarteraM=morning.gastos.filter(g=>g.deCartera).reduce((s,g)=>s+num(g.cantidad),0);
  const totalOtrosM=morning.otrosIngresos.reduce((s,o)=>s+num(o.cantidad),0);
  const efectivoTeoricoM=num(morning.ventaEfectivo)+totalOtrosM-totalGastosCajaM-propinaMananaNeta2;

  const sendToSheets=(params)=>new Promise(resolve=>{
    const callbackName="cb_"+Date.now();
    const url=SCRIPT_URL+"?callback="+callbackName+"&"+Object.entries(params).map(([k,v])=>encodeURIComponent(k)+"="+encodeURIComponent(v??"")).join("&");
    window[callbackName]=()=>{delete window[callbackName];script.remove();resolve();};
    const script=document.createElement("script");
    script.src=url;
    script.onerror=()=>{delete window[callbackName];script.remove();resolve();};
    document.head.appendChild(script);
    setTimeout(()=>{delete window[callbackName];script.remove();resolve();},8000);
  });

  const handleSendMorning=async()=>{
    try{
      await sendToSheets({
        tipo:"manana",
        fecha:morning.fecha||new Date().toLocaleDateString("es-MX"),
        barista:morning.barista,
        horaCierre:morning.hora,
        ventaEfectivo:num(morning.ventaEfectivo),
        ventaTarjeta:num(morning.ventaTarjeta),
        transferencias:num(morning.transferencias),
        propinaTarjeta:num(morning.propinaTarjeta),
        propinaNeta:propinaMananaNeta2,
        otrosIngresos:totalOtrosM,
        gastosCaja:totalGastosCajaM,
        gastosCartera:totalGastosCarteraM,
        efectivoTeorico:efectivoTeoricoM,
        efectivoReal:morning.efectivoReal!==""?num(morning.efectivoReal):"",
        diferencia:morning.efectivoReal!==""?num(morning.efectivoReal)-efectivoTeoricoM:"",
        notas:morning.notas,
      });
    }catch(err){console.error(err);}
    setMorningConfirmed(true);
  };

  const handleSendNight=async()=>{
    setSubmittingNight(true);
    try{
      await sendToSheets({
        tipo:"cierre",
        fecha:night.fecha,
        barista:night.barista,
        ventaEfectivo:num(night.ventaEfectivo),
        ventaTarjeta:num(night.ventaTarjeta),
        transferencias:num(night.transferencias),
        propinasTerminal:propinaTotalTerminal,
        propinaTurnoManana:propinaMananaNeta,
        propinaTurnoTarde:propinaNocheNeta,
        otrosIngresos:totalOtrosN,
        gastosCaja:totalGastosCajaN,
        gastosCartera:totalGastosCarteraN,
        totalPropinasPagadas:totalPropinaEfectivo,
        efectivoTeorico,
        efectivoReal:num(night.efectivoReal),
        diferencia:num(night.efectivoReal)-efectivoTeorico,
        notas:night.notas,
      });
    }catch(err){console.error(err);}
    setSubmittingNight(false);
    setNightConfirmed(true);
    try{localStorage.removeItem(STORAGE_KEY_N);}catch(e){}
  };

  const resetAll=()=>{setMorningConfirmed(false);setNightConfirmed(false);setStep("menu");};

  // ── MENU ──────────────────────────────────────────────────────────────────
  if(step==="menu")return h("div",{style:{minHeight:"100vh",background:"linear-gradient(160deg,#fdf6ec 0%,#f5ece0 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative"}},
    showInfo&&h(InfoModal,{onClose:()=>setShowInfo(false)}),
    h("div",{style:{textAlign:"center",marginBottom:40}},
      h("div",{style:{fontSize:40,marginBottom:12}},"☕"),
      h("h1",{style:{margin:0,fontSize:34,fontWeight:400,color:"#2c1f0e"},className:"joscafe"},"Jos Café"),
      h("p",{style:{margin:"6px 0 0",fontSize:12,color:"#8a7560",letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600}},"Corte de Caja")
    ),
    h("div",{style:{width:"100%",maxWidth:340}},
      h("button",{onClick:()=>setStep("morning"),style:{width:"100%",padding:"16px 20px",marginBottom:12,background:"#fff",border:"2px solid #e8dfd4",borderRadius:14,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14,boxShadow:"0 2px 10px rgba(44,31,14,0.07)"}},
        h("span",{style:{fontSize:26}},"🌤"),
        h("div",null,h("div",{style:{fontWeight:800,fontSize:14,color:"#2c1f0e"}},"Corte de Turno Mañana"),h("div",{style:{fontSize:12,color:"#8a7560",marginTop:2}},"Al finalizar el turno de mañana"))
      ),
      h("button",{onClick:()=>{setN({...night,gastos:[]});setStep("night");},style:{width:"100%",padding:"16px 20px",background:"linear-gradient(135deg,#2c1f0e,#4a3520)",border:"none",borderRadius:14,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14,boxShadow:"0 4px 20px rgba(44,31,14,0.25)"}},
        h("span",{style:{fontSize:26}},"🌙"),
        h("div",null,h("div",{style:{fontWeight:800,fontSize:14,color:"#fff"}},"Corte de Cierre"),h("div",{style:{fontSize:12,color:"#c9a96e",marginTop:2}},"Al finalizar el turno de tarde"))
      )
    ),
    h("p",{style:{marginTop:32,fontSize:11,color:"#b0a090",textAlign:"center"}},new Date().toLocaleDateString("es-MX",{weekday:"long",year:"numeric",month:"long",day:"numeric"})),
    h("button",{onClick:()=>setShowInfo(true),style:{position:"absolute",bottom:28,right:24,background:"#fff",border:"1.5px solid #e0d0b8",borderRadius:"50%",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#8a7560",fontSize:15,fontWeight:900,boxShadow:"0 2px 8px rgba(44,31,14,0.10)"}},"i")
  );

  // ── MORNING CONFIRMATION ──────────────────────────────────────────────────
  if(step==="morning"&&morningConfirmed){
    const rows=[
      morning.ventaEfectivo&&{label:"Venta efectivo",value:fmt(num(morning.ventaEfectivo))},
      morning.ventaTarjeta&&{label:"Venta tarjeta",value:fmt(num(morning.ventaTarjeta))},
      num(morning.propinaTarjeta)>0&&{label:"Propina tarjeta",value:fmt(num(morning.propinaTarjeta))},
      num(morning.propinaTarjeta)>0&&{label:"Propina turno mañana (96%)",value:fmt(propinaMananaNeta2),color:"#5060a0"},
      totalOtrosM>0&&{label:"+ Otros ingresos",value:fmt(totalOtrosM),color:"#4a8c5c"},
      totalGastosCajaM>0&&{label:"− Gastos de caja",value:"−"+fmt(totalGastosCajaM),color:"#c97a4a"},
      totalGastosCarteraM>0&&{label:"Gastos de cartera 👜",value:fmt(totalGastosCarteraM),color:"#a09080"},
    ];
    return h(ConfirmationScreen,{title:"Resumen Turno Mañana",iconEmoji:"🌤",rows,teorico:efectivoTeoricoM,efectivoReal:morning.efectivoReal,notas:morning.notas,onBack:()=>{setMorningConfirmed(false);setStep("menu");}});
  }

  // ── NIGHT CONFIRMATION ────────────────────────────────────────────────────
  if(step==="night"&&nightConfirmed){
    const rows=[
      night.ventaEfectivo&&{label:"Venta efectivo",value:fmt(num(night.ventaEfectivo))},
      night.ventaTarjeta&&{label:"Venta tarjeta",value:fmt(num(night.ventaTarjeta))},
      night.transferencias&&{label:"Transferencias",value:fmt(num(night.transferencias))},
      num(night.propinaTarjeta)>0&&{label:"Propinas terminal",value:fmt(propinaTotalTerminal)},
      propinaMananaNeta>0&&{label:"Propina turno mañana (96%)",value:fmt(propinaMananaNeta),color:"#5060a0"},
      {label:"Propina turno tarde (96%)",value:fmt(propinaNocheNeta),color:"#a05000"},
      totalOtrosN>0&&{label:"+ Otros ingresos",value:fmt(totalOtrosN),color:"#4a8c5c"},
      totalGastosCajaN>0&&{label:"− Gastos de caja",value:"−"+fmt(totalGastosCajaN),color:"#c97a4a"},
      totalGastosCarteraN>0&&{label:"Gastos de cartera 👜",value:fmt(totalGastosCarteraN),color:"#a09080"},
      totalPropinaEfectivo>0&&{label:"− Propinas pagadas",value:"−"+fmt(totalPropinaEfectivo),color:"#6a7fc9"},
    ];
    return h(ConfirmationScreen,{title:"Resumen Corte de Cierre",iconEmoji:"🌙",rows,teorico:efectivoTeorico,efectivoReal:night.efectivoReal,notas:night.notas,onBack:resetAll});
  }

  // ── MORNING FORM ──────────────────────────────────────────────────────────
  if(step==="morning")return h("div",{style:{minHeight:"100vh",background:"linear-gradient(160deg,#fdf6ec 0%,#f5ece0 100%)",paddingBottom:40}},
    h("div",{style:{background:"#fff8ee",borderBottom:"1px solid #f0e4ce",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10}},
      h("button",{onClick:()=>setStep("menu"),style:{background:"none",border:"none",cursor:"pointer",color:"#8a7560",fontSize:20,padding:0}},"←"),
      h("span",{style:{fontSize:18}},"🌤"),
      h("div",{style:{flex:1,fontWeight:800,fontSize:14,color:"#2c1f0e"}},"Corte Turno Mañana"),
      h(ClearButton,{onClear:clearMorning})
    ),
    h("div",{style:{padding:"20px 16px",maxWidth:480,margin:"0 auto"}},
      h(Card,null,
        h(SectionHeader,{icon:"📋",title:"Datos del turno",accent:"#8a6a30"}),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}},
          h("div",null,h(Label,null,"Barista"),h("select",{value:morning.barista,onChange:e=>setM({...morning,barista:e.target.value}),style:s.select},DEFAULT_BARISTAS.map(b=>h("option",{key:b},b)))),
          h("div",null,h(Label,null,"Hora cierre turno"),h("input",{type:"time",value:morning.hora,onChange:e=>setM({...morning,hora:e.target.value}),style:{...s.select,boxSizing:"border-box"}}))
        ),
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}},h(Label,null,"Ventas del turno"),h(HelpIcon,null)),
        h(MoneyInput,{hint:"Efectivo",value:morning.ventaEfectivo,onChange:v=>setM({...morning,ventaEfectivo:v})}),
        h(MoneyInput,{hint:"Tarjeta",value:morning.ventaTarjeta,onChange:v=>setM({...morning,ventaTarjeta:v})}),
        h(MoneyInput,{hint:"Transferencias",value:morning.transferencias||"",onChange:v=>setM({...morning,transferencias:v})})
      ),
      h(Card,null,
        h(SectionHeader,{icon:"💳",title:"Propinas en tarjeta",accent:"#6a7fc9"}),
        h(MoneyInput,{value:morning.propinaTarjeta,onChange:v=>setM({...morning,propinaTarjeta:v}),hint:num(morning.propinaTarjeta)>0?"Propina turno mañana (96%): "+fmt(propinaMananaNeta2):null})
      ),
      h(OtrosIngresos,{items:morning.otrosIngresos,onAdd:addMOI,onRemove:removeMOI,onUpdate:updateMOI}),
      h(Card,null,
        h(SectionHeader,{icon:"💸",title:"Gastos en efectivo",accent:"#c97a4a"}),
        h(ExpenseBlock,{gastos:morning.gastos,onAdd:addME,onRemove:removeME,onUpdate:updateME})
      ),
      h(Card,{style:{background:"#fdf8f0",border:"1.5px solid #e8d4b8"}},
        h(SectionHeader,{icon:"🧮",title:"Resumen del turno",accent:"#8a6a30"}),
        h(ResumenRows,{rows:[
          {label:"Ventas en efectivo",value:fmt(num(morning.ventaEfectivo))},
          totalOtrosM>0&&{label:"+ Otros ingresos",value:fmt(totalOtrosM),color:"#4a8c5c"},
          totalGastosCajaM>0&&{label:"− Gastos de caja",value:"− "+fmt(totalGastosCajaM),color:"#c97a4a"},
          propinaMananaNeta2>0&&{label:"− Propina turno mañana (96%)",value:"− "+fmt(propinaMananaNeta2),color:"#6a7fc9"},
        ]}),
        h("div",{style:{height:1,background:"#e0c898",margin:"10px 0"}}),
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("span",{style:{fontSize:14,fontWeight:800,color:"#2c1f0e"}},"Efectivo teórico"),
          h("span",{style:{fontFamily:"monospace",fontWeight:900,fontSize:18,color:"#2c1f0e"}},fmt(efectivoTeoricoM))
        )
      ),
      h(Card,null,
        h(SectionHeader,{icon:"💰",title:"Conteo de caja",accent:"#2c7a4a"}),
        h(MoneyInput,{label:"Efectivo real contado",value:morning.efectivoReal,onChange:v=>setM({...morning,efectivoReal:v}),hint:"Sin incluir el fondo de $1,500"}),
        h(DiferenciaBox,{teorico:efectivoTeoricoM,real:morning.efectivoReal})
      ),
      h(Card,null,
        h(SectionHeader,{icon:"📝",title:"Notas del turno",accent:"#7a7a9a"}),
        h("textarea",{value:morning.notas,onChange:e=>setM({...morning,notas:e.target.value}),rows:2,placeholder:"Cualquier situación a reportar al turno tarde...",style:s.textarea})
      ),
      h("button",{onClick:handleSendMorning,style:{width:"100%",padding:"14px",background:"#2c1f0e",color:"#fff",border:"none",borderRadius:12,fontWeight:800,fontSize:14,cursor:"pointer"}},"Listo — Enviar corte de mañana"),
      h("div",{style:{background:"#fffbee",border:"1px solid #f0dfa0",borderRadius:10,padding:"10px 14px",marginTop:12,fontSize:12,color:"#7a6020"}},
        "⚠️ Si al iniciar el turno la caja no tenía exactamente ",h("strong",null,"$1,500"),", reporta a gerencia."
      )
    )
  );

  // ── NIGHT FORM ────────────────────────────────────────────────────────────
  return h("div",{style:{minHeight:"100vh",background:"linear-gradient(160deg,#fdf6ec 0%,#f5ece0 100%)",paddingBottom:40}},
    showMorningSummary&&h(MorningSummaryModal,{morning,onClose:()=>setShowMorningSummary(false)}),
    h("div",{style:{background:"#2c1f0e",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10}},
      h("button",{onClick:()=>setStep("menu"),style:{background:"none",border:"none",cursor:"pointer",color:"#c9a96e",fontSize:20,padding:0}},"←"),
      h("span",{style:{fontSize:18}},"🌙"),
      h("div",{style:{flex:1}},h("div",{style:{fontWeight:800,fontSize:14,color:"#fff"}},"Corte de Cierre"),h("div",{style:{fontSize:11,color:"#c9a96e"}},"Día completo")),
      h("button",{onClick:()=>setShowMorningSummary(true),style:{background:"#3d2c18",border:"1px solid #c9a96e44",borderRadius:8,color:"#c9a96e",fontSize:11,fontWeight:700,padding:"6px 10px",cursor:"pointer",marginRight:8}},"🌤 Ver turno mañana"),
      h(ClearButton,{onClear:clearNight})
    ),
    h("div",{style:{padding:"18px 16px",maxWidth:480,margin:"0 auto"}},
      h(Card,null,
        h(SectionHeader,{icon:"📋",title:"Información del corte"}),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
          h("div",null,h(Label,null,"Fecha"),h("input",{type:"date",value:night.fecha,onChange:e=>setN({...night,fecha:e.target.value}),style:{...s.select,boxSizing:"border-box"}})),
          h("div",null,h(Label,null,"Barista"),h("select",{value:night.barista,onChange:e=>setN({...night,barista:e.target.value}),style:s.select},DEFAULT_BARISTAS.map(b=>h("option",{key:b},b))))
        )
      ),
      h(Card,null,
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
          h(SectionHeader,{icon:"📊",title:"Ventas del día (Waiterio)",accent:"#4a8c5c"}),
          h("div",{style:{marginBottom:14}},h(HelpIcon,null))
        ),
        h(MoneyInput,{label:"Total ventas en efectivo",value:night.ventaEfectivo,onChange:v=>setN({...night,ventaEfectivo:v})}),
        h(MoneyInput,{label:"Total ventas en tarjeta",value:night.ventaTarjeta,onChange:v=>setN({...night,ventaTarjeta:v})}),
        h(MoneyInput,{label:"Transferencias",value:night.transferencias,onChange:v=>setN({...night,transferencias:v})})
      ),
      h(OtrosIngresos,{items:night.otrosIngresos,onAdd:addOI,onRemove:removeOI,onUpdate:updateOI}),
      h(Card,null,
        h(SectionHeader,{icon:"💳",title:"Propinas en tarjeta",accent:"#6a7fc9"}),
        h(MoneyInput,{label:"Total propinas según terminal (día completo)",value:night.propinaTarjeta,onChange:v=>setN({...night,propinaTarjeta:v})}),
        propinaTotalTerminal>0&&h("div",{style:{background:"#f0f4ff",borderRadius:10,padding:"12px 14px",marginTop:-4}},
          propinaManana>0?h(Fragment,null,
            h("div",{style:{marginBottom:10}},
              h("div",{style:{fontSize:10,fontWeight:700,color:"#8a90c0",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}},"Turno mañana"),
              h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,color:"#5060a0"}},h("span",null,"Propina turno mañana (96%)"),h("span",{style:{fontFamily:"monospace",fontWeight:700}},fmt(propinaMananaNeta)))
            ),
            h("div",{style:{background:"#fff4e0",borderRadius:8,padding:"10px 12px",marginBottom:10,border:"1.5px solid #e8c070"}},
              h("div",{style:{fontSize:10,fontWeight:700,color:"#8a6010",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}},"Turno tarde"),
              h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:15,color:"#a05000",fontWeight:900}},h("span",null,"Propina turno tarde (96%)"),h("span",{style:{fontFamily:"monospace"}},fmt(propinaNocheNeta))),
              h("div",{style:{fontSize:11,color:"#8a6010",marginTop:3}},"Este es el monto a cobrar en efectivo")
            ),
            h("div",{style:{height:1,background:"#c8d0f0",marginBottom:10}})
          ):h("div",{style:{background:"#fff4e0",borderRadius:8,padding:"10px 12px",marginBottom:10,border:"1.5px solid #e8c070"}},
            h("div",{style:{fontSize:10,fontWeight:700,color:"#8a6010",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}},"Turno tarde (día completo)"),
            h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,color:"#7a6040",marginBottom:3}},h("span",null,"Total terminal"),h("span",{style:{fontFamily:"monospace"}},fmt(propinaTotalTerminal))),
            h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,color:"#7a6040",marginBottom:6}},h("span",null,"Comisión (4%)"),h("span",{style:{fontFamily:"monospace"}},"− "+fmt(propinaTotalTerminal*COMMISSION))),
            h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:15,color:"#a05000",fontWeight:900}},h("span",null,"Propina turno tarde (96%)"),h("span",{style:{fontFamily:"monospace"}},fmt(propinaNocheNeta))),
            h("div",{style:{fontSize:11,color:"#8a6010",marginTop:3}},"No hubo propinas en mañana — todo corresponde al turno tarde")
          ),
          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,color:"#2c3a7a",fontWeight:800}},h("span",null,"Total a salir de caja"),h("span",{style:{fontFamily:"monospace"}},"− "+fmt(totalPropinaEfectivo)))
        )
      ),
      h(Card,null,
        h(SectionHeader,{icon:"💸",title:"Gastos en efectivo",accent:"#c97a4a"}),
        h(ExpenseBlock,{gastos:allGastos,onAdd:addNE,onRemove:removeNE,onUpdate:updateNE,fromMorningCount:morningGastos.length}),
        totalGastosCarteraN>0&&h("div",{style:{marginTop:10,padding:"8px 12px",background:"#f8f5f0",borderRadius:8,fontSize:12,color:"#8a7560",display:"flex",justifyContent:"space-between"}},
          h("span",null,"👜 Gastos de cartera (no afectan caja)"),h("span",{style:{fontFamily:"monospace"}},fmt(totalGastosCarteraN))
        )
      ),
      h(Card,{style:{background:"#fdf8f0",border:"1.5px solid #e8d4b8"}},
        h(SectionHeader,{icon:"🧮",title:"Resumen del corte",accent:"#8a6a30"}),
        h(ResumenRows,{rows:[
          {label:"Ventas en efectivo",value:fmt(num(night.ventaEfectivo))},
          totalOtrosN>0&&{label:"+ Otros ingresos",value:fmt(totalOtrosN),color:"#4a8c5c"},
          totalGastosCajaN>0&&{label:"− Gastos de caja",value:"− "+fmt(totalGastosCajaN),color:"#c97a4a"},
          totalPropinaEfectivo>0&&{label:"− Propinas pagadas",value:"− "+fmt(totalPropinaEfectivo),color:"#6a7fc9"},
        ]}),
        h("div",{style:{height:1,background:"#e0c898",margin:"10px 0"}}),
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("span",{style:{fontSize:14,fontWeight:800,color:"#2c1f0e"}},"Efectivo teórico"),
          h("span",{style:{fontFamily:"monospace",fontWeight:900,fontSize:18,color:efectivoTeorico<0?"#c04030":"#2c1f0e"}},fmt(efectivoTeorico))
        ),
        efectivoTeorico<0&&h("div",{style:{marginTop:10,background:"#fff0f0",border:"1px solid #f0b8a8",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#c04030",fontWeight:700}},"⚠️ Saldo negativo — reportar a gerencia")
      ),
      h(Card,null,
        h(SectionHeader,{icon:"💰",title:"Conteo de caja",accent:"#2c7a4a"}),
        h(MoneyInput,{label:"Efectivo real contado",value:night.efectivoReal,onChange:v=>setN({...night,efectivoReal:v}),hint:"Sin incluir el fondo de $1,500"}),
        h(DiferenciaBox,{teorico:efectivoTeorico,real:night.efectivoReal})
      ),
      h(Card,null,
        h(SectionHeader,{icon:"📝",title:"Notas del cierre",accent:"#7a7a9a"}),
        h("textarea",{value:night.notas,onChange:e=>setN({...night,notas:e.target.value}),rows:3,placeholder:"Observaciones, incidentes, cualquier comentario sobre el día...",style:s.textarea})
      ),
      h("button",{onClick:handleSendNight,disabled:submittingNight||!night.ventaEfectivo||!night.efectivoReal,
        style:{width:"100%",padding:"16px",borderRadius:14,border:"none",
          background:submittingNight?"#a0907a":(!night.ventaEfectivo||!night.efectivoReal)?"#d4c8b8":"linear-gradient(135deg,#2c1f0e,#4a3520)",
          color:"#fff",fontSize:15,fontWeight:900,cursor:submittingNight||!night.ventaEfectivo||!night.efectivoReal?"not-allowed":"pointer",
          letterSpacing:"0.04em",boxShadow:"0 4px 16px rgba(44,31,14,0.2)"}},
        submittingNight?"Enviando corte...":"Enviar corte del día"
      ),
      h("p",{style:{textAlign:"center",fontSize:11,color:"#b0a090",marginTop:8}},"Al presionar, el corte se enviará al registro.")
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(h(App,null));
</script>
</body>
</html>
